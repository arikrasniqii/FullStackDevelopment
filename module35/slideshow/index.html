<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slideshow</title>
    <link rel="stylesheet" type="text/css" href="style.css">
</head>
<body>
    <div id="slideWrapper">
        <div class="slide">
            <img src="img/img1.jpg" style="width: 100%;"/>
        </div>

        <div class="slide">
            <img src="img/img2.avif" style="width: 100%;"/>
        </div>

        <div class="slide">
            <img src="img/img3.jpg" style="width: 100%;"/>
        </div>
    
    </div>

    <a class="prev"><img src="img/barrow.svg" style="width: 50px; height:50px;"  onclick="plusSlides(-1)" ></a>
	<a class="next"><img src="img/farrow.png" style="width: 50px; height:50px;" onclick="plusSlides(1)"></a>
    
    

    <script  src="main.js"></script>
</body>
</html>
